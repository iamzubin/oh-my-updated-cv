<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Handle -->
  <rect x="13" y="18" width="6" height="12" rx="1" fill="#1a1a1a"/>
  <rect x="14" y="19" width="1" height="10" fill="#333"/>
  <rect x="17" y="19" width="1" height="10" fill="#333"/>
  <!-- Guard -->
  <rect x="12" y="16" width="8" height="3" rx="0.5" fill="#2a2a2a"/>
  <!-- Blade -->
  <rect x="14" y="2" width="4" height="15" rx="2" fill="#ff3333" filter="url(#glow)"/>
  <rect x="15" y="3" width="2" height="13" rx="1" fill="#ff6666"/>
</svg>
